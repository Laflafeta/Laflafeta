<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laflafeta Store | لافلفيتا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --soft-pink: #fff0f5;       /* وردي فاتح جداً */
            --medium-pink: #fce4ec;     /* حدود ناعمة */
            --deep-pink: #f48fb1;       /* اللون الأساسي */
            --dark-pink: #e91e63;       /* للتركيز والنصوص */
            --white: #ffffff;
            --light-bg: #fffbfd;        /* خلفية الصفحة */
            --text-main: #5d4037;       /* بني دافئ بدلاً من الأسود */
            --soft-shadow: 0 10px 30px rgba(244, 143, 177, 0.12);
            --danger-red: #ff5252;
            --discount-bg: #f06292;
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--light-bg); color: var(--text-main); padding-bottom: 120px; }

        header {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            padding: 12px 6%; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 4px 20px rgba(244, 143, 177, 0.08);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--soft-pink);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area h1 { color: var(--dark-pink); margin: 0; font-size: 1.7rem; font-weight: 800; letter-spacing: -1px; }
        #main-logo { height: 55px; width: 55px; border-radius: 50%; border: 3px solid var(--white); box-shadow: var(--soft-shadow); object-fit: cover; }
        
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        .lang-btn { 
            background: var(--soft-pink); color: var(--dark-pink); border: none; 
            padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: 600; 
        }

        .category-tabs {
            display: flex; gap: 12px; overflow-x: auto; padding: 25px 0;
            margin-bottom: 10px; scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: var(--white); color: var(--deep-pink); border: 1.5px solid var(--medium-pink);
            padding: 10px 28px; border-radius: 30px; cursor: pointer; white-space: nowrap;
            font-weight: 600; font-size: 0.9rem;
        }
        .tab-btn.active {
            background: var(--dark-pink); color: var(--white); border-color: var(--dark-pink);
            box-shadow: 0 8px 15px rgba(233, 30, 99, 0.2);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        #product-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }

        .product-card { 
            background: var(--white); border-radius: 35px; padding: 18px; 
            text-align: center; box-shadow: var(--soft-shadow); border: 1px solid rgba(255,255,255,0.7); 
            cursor: pointer; position: relative; overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        .discount-badge {
            position: absolute; top: 20px; left: 20px;
            background: var(--discount-bg); color: white;
            padding: 6px 14px; border-radius: 15px;
            font-weight: bold; font-size: 0.8rem; z-index: 10;
        }
        html[dir="rtl"] .discount-badge { left: auto; right: 20px; }

        .price-old {
            text-decoration: line-through;
            color: #a1887f;
            font-size: 0.9rem;
            margin-right: 5px;
            font-weight: normal;
        }
        .price-new {
            color: var(--dark-pink);
            font-weight: 800;
            font-size: 1.2rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(244, 143, 177, 0.2); }
        .product-card img { width: 100%; height: 280px; object-fit: cover; border-radius: 28px; margin-bottom: 10px; }
        
        .card-desc {
            font-size: 0.85rem; color: #8d6e63; margin: 10px 0;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; line-height: 1.5; height: 3em;
        }

        .oos-label { color: var(--danger-red); font-weight: bold; margin-top: 10px; font-size: 0.95rem; background: #fff1f1; padding: 8px; border-radius: 15px; }

        #detail-modal, #cart-overlay {
            position: fixed; inset: 0; background: rgba(255, 235, 240, 0.6); 
            z-index: 3000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(12px);
        }
        .modal-content {
            background: white; width: 92%; max-width: 480px; border-radius: 40px;
            padding: 35px; position: relative; animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.08);
            border: 1px solid var(--soft-pink);
        }
        .close-btn { position: absolute; top: 25px; right: 25px; font-size: 1.4rem; color: #d1d1d1; cursor: pointer; z-index: 100; }
        html[dir="rtl"] .close-btn { right: auto; left: 25px; }

        .qty-control { display: flex; align-items: center; gap: 20px; margin: 20px auto; background: var(--soft-pink); padding: 8px 15px; border-radius: 25px; width: fit-content; }
        .qty-btn { background: var(--white); color: var(--dark-pink); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
        #qty-val { font-weight: 800; font-size: 1.2rem; color: var(--dark-pink); }

        .size-selector { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .size-option {
            min-width: 60px; border: 2px solid var(--soft-pink); padding: 10px 15px;
            border-radius: 20px; cursor: pointer; text-align: center; font-weight: 600;
        }
        .size-option.active { border-color: var(--dark-pink); background: var(--soft-pink); color: var(--dark-pink); }
        .size-option.oos-size { opacity: 0.4; background: #f5f5f5; cursor: not-allowed; text-decoration: line-through; }

        .carousel-container { position: relative; width: 100%; height: 300px; border-radius: 30px; overflow: hidden; margin-bottom: 20px; box-shadow: var(--soft-shadow); }
        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .carousel-track img { min-width: 100%; height: 100%; object-fit: cover; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: var(--dark-pink); backdrop-filter: blur(4px); }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        .btn-main { 
            width: 100%; background: linear-gradient(135deg, var(--deep-pink), var(--dark-pink)); color: white; padding: 18px; 
            border: none; border-radius: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 8px 20px rgba(233, 30, 99, 0.25);
        }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(233, 30, 99, 0.35); }

        .social-bar { 
            display: flex; justify-content: center; gap: 35px; padding: 18px; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            border-top: 1px solid var(--soft-pink); position: fixed; bottom: 0; width: 100%; z-index: 2000;
        }
        .social-bar a { color: var(--dark-pink); font-size: 1.8rem; display: none; }

        #soft-toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(45, 45, 45, 0.9); color: white; padding: 14px 30px;
            border-radius: 50px; font-weight: 600; font-size: 0.95rem;
            display: none; z-index: 5000; animation: fadeInOut 2.5s ease-in-out;
            backdrop-filter: blur(5px);
        }

        .cart-item {
            background: var(--white); padding: 15px; border-radius: 25px;
            margin-bottom: 15px; border: 1px solid var(--soft-pink);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .form-group input, .form-group select {
            width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 20px; 
            border: 1.5px solid var(--soft-pink); outline: none; background: var(--light-bg);
            font-size: 0.95rem; color: var(--text-main);
        }
        .form-group input:focus { border-color: var(--deep-pink); background: white; }

        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, 20px); } 15% { opacity: 1; transform: translate(-50%, 0); } 85% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -10px); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area" onclick="location.reload()">
            <img src="logo.png" id="main-logo" onerror="this.style.display='none'">
            <h1 id="brand-name">Laflafeta</h1>
        </div>
        <div class="nav-controls">
            <button class="lang-btn" onclick="toggleLanguage()" id="lang-switcher">العربية</button>
            <button onclick="toggleCart()" style="background: var(--dark-pink); color:white; border:none; padding:10px 22px; border-radius:25px; cursor:pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(233, 30, 99, 0.2);">
                <i class="fas fa-shopping-bag"></i> (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <div class="container">
        <div class="category-tabs" id="tabs-container"></div>
        <div id="product-display"></div>
    </div>

    <div id="soft-toast">Added to cart! 🌸</div>

    <div id="detail-modal" onclick="if(event.target == this) closeDetail()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeDetail()"><i class="fas fa-times"></i></div>
            
            <div class="carousel-container">
                <div class="carousel-track" id="det-carousel-track"></div>
                <button class="carousel-btn prev-btn" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="carousel-btn next-btn" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
            </div>

            <h2 id="det-title" style="margin:10px 0; color:var(--dark-pink); text-align:center;"></h2>
            
            <div id="det-desc-full" style="font-size:0.95rem; color:#6d4c41; line-height:1.7; margin:15px 0; white-space: pre-line; background: #fff8fb; padding: 15px; border-radius: 20px; border-right: 5px solid var(--deep-pink);"></div>
            
            <div id="size-area" style="text-align:center;">
                <label id="txt-choose-size" style="font-weight:bold; color: var(--text-main);"></label>
                <div class="size-selector" id="size-box"></div>
            </div>

            <div style="text-align: center;">
                <label id="txt-qty-label" style="font-weight:bold; color: var(--text-main);"></label>
                <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty(-1)">-</button>
                    <span id="qty-val">1</span>
                    <button class="qty-btn" onclick="updateQty(1)">+</button>
                </div>
            </div>

            <div style="display:flex; flex-direction: column; gap: 15px; margin-top:20px; border-top:1px solid var(--soft-pink); padding-top:20px;">
                <div id="det-price" style="font-size:1.7rem; font-weight:900; color:var(--dark-pink); text-align:center;"></div>
                <button id="btn-add-cart" onclick="confirmAddToCart()" class="btn-main"></button>
            </div>
        </div>
    </div>

    <div id="cart-overlay" onclick="if(event.target == this) toggleCart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="toggleCart()"><i class="fas fa-times"></i></div>
            <h2 id="txt-cart-title" style="text-align:center; color:var(--dark-pink); margin-bottom: 25px;"></h2>
            <div id="cart-items-list" style="max-height: 250px; overflow-y: auto; padding-right: 5px;"></div>
            <div id="total-price-tag" style="background:var(--soft-pink); padding:18px; border-radius:25px; margin:20px 0; text-align:center; font-weight:900; color:var(--dark-pink); font-size: 1.2rem;"></div>

            <div class="form-group">
                <input type="text" id="cust-name">
                <input type="number" id="cust-phone">
                <select id="cust-city"></select>
                <input type="text" id="cust-address">
                <button class="btn-main" id="btn-submit-order" onclick="submitOrder()"></button>
            </div>
        </div>
    </div>

    <div class="social-bar">
        <a id="link-wa" href="#" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a id="link-fb" href="#" target="_blank"><i class="fab fa-facebook"></i></a>
        <a id="link-ig" href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        <a id="link-tk" href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://laflafita2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'en';
        let cart = [];
        let allProds = [];
        let activeProd = null;
        let activeSize = null;
        let activePrice = 0;
        let activeQty = 1;
        let selectedCategory = "All"; 
        let currentSlideIndex = 0;
        let carouselInterval;

        const i18n = {
            en: {
                langSwitcher: "العربية",
                allTab: "All Items",
                cart: "Your Cart 🛍️",
                addToCart: "Add to Cart",
                oos: "Out of Stock ❌",
                chooseSize: "Select Size:",
                total: "Grand Total: ",
                qty: "Quantity:",
                namePlace: "Full Name *",
                phonePlace: "Phone Number *",
                addressPlace: "Detailed Address *",
                submit: "Checkout Now 🎀",
                toast: "Added to cart, gorgeous! 🌸",
                empty: "Your cart is empty 🌸",
                alertSize: "Please choose a size first!",
                alertInfo: "Please complete your info correctly! ⚠️",
                success: "Order received successfully! 🎀",
                discountTxt: "OFF",
                startsFrom: "Starts from",
                cities: ["-- Select City --", "Cairo", "Giza", "Alexandria", "Dakahlia", "Gharbia", "Sharqia", "Monufia", "Kafr El Sheikh", "Damietta", "Beheira", "Ismailia", "Port Said", "Suez", "Qalyubia", "Minya", "Assiut", "Sohag", "Qena", "Luxor", "Aswan", "Fayoum", "Beni Suef", "Red Sea", "New Valley", "Matrouh", "North Sinai", "South Sinai"],
                cats: { "Dresses": "Dresses", "Makeup": "Makeup", "Skin Care": "Skin Care" }
            },
            ar: {
                langSwitcher: "English",
                allTab: "الكل",
                cart: "سلة المشتريات 🛍️",
                addToCart: "إضافة للسلة",
                oos: "نفدت الكمية ❌",
                chooseSize: "اختر الحجم:",
                total: "الإجمالي: ",
                qty: "الكمية:",
                namePlace: "الاسم الرباعي *",
                phonePlace: "رقم الموبايل *",
                addressPlace: "العنوان بالتفصيل *",
                submit: "إتمام الطلب 🎀",
                toast: "تمت الإضافة للسلة يا جميلة 🌸",
                empty: "السلة فاضية يا قمر 🌸",
                alertSize: "اختاري المقاس الأول يا قمر!",
                alertInfo: "كملي البيانات صح يا جميلة! ⚠️",
                success: "تم استلام طلبك بنجاح! 🎀",
                discountTxt: "خصم",
                startsFrom: "يبدأ من",
                cities: ["-- اختر المحافظة --", "القاهرة", "الجيزة", "الإسكندرية", "الدقهلية", "الغربية", "الشرقية", "المنوفية", "كفر الشيخ", "دمياط", "البحيرة", "الإسماعيلية", "بورسعيد", "السويس", "القليوبية", "المنيا", "أسيوط", "سوهاج", "قنا", "الأقصر", "أسوان", "الفيوم", "بني سويف", "البحر الأحمر", "الوادي الجديد", "مطروح", "شمال سيناء", "جنوب سيناء"],
                cats: { "Dresses": "فساتين", "Makeup": "مكياج", "Skin Care": "عناية بالبشرة" }
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            updateStaticTexts();
            renderTabs();
            renderProducts();
            if(document.getElementById('cart-overlay').style.display === 'flex') renderCartItems();
        }

        function updateStaticTexts() {
            const t = i18n[currentLang];
            document.getElementById('lang-switcher').innerText = t.langSwitcher;
            document.getElementById('txt-cart-title').innerText = t.cart;
            document.getElementById('btn-submit-order').innerText = t.submit;
            document.getElementById('cust-name').placeholder = t.namePlace;
            document.getElementById('cust-phone').placeholder = t.phonePlace;
            document.getElementById('cust-address').placeholder = t.addressPlace;
            document.getElementById('txt-qty-label').innerText = t.qty;
            const citySelect = document.getElementById('cust-city');
            citySelect.innerHTML = t.cities.map((c, idx) => `<option value="${idx === 0 ? '' : c}">${c}</option>`).join('');
            if(activeProd) {
                document.getElementById('txt-choose-size').innerText = t.chooseSize;
                document.getElementById('btn-add-cart').innerText = t.addToCart;
            }
        }

        db.ref('products').on('value', snap => {
            const data = snap.val();
            if(data) {
                allProds = Object.keys(data).map(id => ({ id, ...data[id] }));
                renderTabs();
                renderProducts();
                updateStaticTexts();
            }
        });

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            const categories = ["All", ...new Set(allProds.map(p => p.category).filter(c => c))];
            tabsContainer.innerHTML = categories.map(cat => `
                <button class="tab-btn ${selectedCategory === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">
                    ${cat === "All" ? i18n[currentLang].allTab : (i18n[currentLang].cats[cat] || cat)}
                </button>
            `).join('');
        }

        function filterCategory(cat) { selectedCategory = cat; renderTabs(); renderProducts(); }

        function renderProducts() {
            const t = i18n[currentLang];
            const display = document.getElementById('product-display');
            const filtered = selectedCategory === "All" ? allProds : allProds.filter(p => p.category === selectedCategory);

            display.innerHTML = filtered.map(p => {
                const stockVal = parseInt(p.stock || 0);
                const sStock = parseInt(p.stockSm || 0);
                const mStock = parseInt(p.stockMd || 0);
                const lStock = parseInt(p.stockLg || 0);
                const isOOS = (stockVal <= 0 && sStock <= 0 && mStock <= 0 && lStock <= 0);
                
                const discountVal = p.discount ? parseInt(p.discount) : 0;
                const mainImg = (p.imgs && p.imgs.length > 0) ? p.imgs[0] : (p.img || '');

                let prices = [p.priceBase, p.priceSm, p.priceMd, p.priceLg]
                .map(pr => parseFloat(pr)).filter(pr => !isNaN(pr) && pr > 0);
                
                const originalPrice = prices.length > 0 ? Math.min(...prices) : 0;
                const finalPrice = discountVal > 0 ? (originalPrice * (1 - discountVal / 100)) : originalPrice;

                return `
                    <div class="product-card" onclick="${isOOS ? '' : `openDetail('${p.id}')`}" style="${isOOS ? 'opacity:0.65; cursor:default' : ''}">
                        ${discountVal > 0 && !isOOS ? `<div class="discount-badge">-${discountVal}% ${t.discountTxt}</div>` : ''}
                        <img src="${mainImg}">
                        <h3 style="margin: 10px 0 5px 0; color: #4e342e;">${p.name}</h3>
                        <div class="card-desc">${p.desc || ''}</div>
                        ${isOOS ? `<div class="oos-label">${t.oos}</div>` : `
                            <div class="price-tag">
                                ${prices.length > 1 ? `<small style="font-size:0.75rem; color:#a1887f;">${t.startsFrom}</small> ` : ''}
                                ${discountVal > 0 ? `<span class="price-old">${originalPrice.toFixed(0)}</span>` : ''}
                                <span class="price-new">${finalPrice.toFixed(0)} EGP</span>
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        function openDetail(id) {
            activeProd = allProds.find(p => p.id === id);
            if(!activeProd) return;

            activeSize = null;
            activeQty = 1;

            let prices = [activeProd.priceBase, activeProd.priceSm, activeProd.priceMd, activeProd.priceLg]
                .map(pr => parseFloat(pr)).filter(pr => !isNaN(pr) && pr > 0);
            
            const discountVal = activeProd.discount ? parseInt(activeProd.discount) : 0;
            const minPrice = prices.length > 0 ? Math.min(...prices) : 0;
            activePrice = discountVal > 0 ? (minPrice * (1 - discountVal / 100)) : minPrice;

            currentSlideIndex = 0;
            const track = document.getElementById('det-carousel-track');
            const images = activeProd.imgs || [activeProd.img];
            track.innerHTML = images.map(img => `<img src="${img}">`).join('');
            track.style.transform = `translateX(0)`;

            document.getElementById('det-title').innerText = activeProd.name;
            
            const fullDesc = activeProd.desc || "";
            document.getElementById('det-desc-full').innerText = fullDesc;
            document.getElementById('det-desc-full').style.display = fullDesc ? 'block' : 'none';
            
            document.getElementById('qty-val').innerText = activeQty;
            
            updateStaticTexts();
            renderSizes();
            document.getElementById('detail-modal').style.display = 'flex';

            clearInterval(carouselInterval);
            if(images.length > 1) carouselInterval = setInterval(() => moveSlide(1), 4000);
        }

        function updateQty(n) {
            activeQty += n;
            if (activeQty < 1) activeQty = 1;
            document.getElementById('qty-val').innerText = activeQty;
            updateDetailPrice();
        }

        function renderSizes() {
            const box = document.getElementById('size-box');
            const area = document.getElementById('size-area');
            const hasSizes = activeProd.priceSm || activeProd.priceMd || activeProd.priceLg;
            area.style.display = hasSizes ? 'block' : 'none';
            if(hasSizes) {
                let html = "";
                const sizes = {Sm:'S', Md:'M', Lg:'L'};
                const labels = ['Sm','Md','Lg'];
                const discountVal = activeProd.discount ? parseInt(activeProd.discount) : 0;

                labels.forEach(s => {
                    let pr = parseFloat(activeProd['price'+s]);
                    const st = parseInt(activeProd['stock'+s] || 0);
                    if(pr) {
                        if(discountVal > 0) pr = pr * (1 - discountVal/100);
                        if(st > 0) html += `<div class="size-option ${activeSize===s?'active':''}" onclick="selectSize('${s}', ${pr})">${sizes[s]}</div>`;
                        else html += `<div class="size-option oos-size">${sizes[s]}</div>`;
                    }
                });
                box.innerHTML = html;
            }
            updateDetailPrice();
        }

        function selectSize(s, p) { activeSize = s; activePrice = p; renderSizes(); }
        function updateDetailPrice() { document.getElementById('det-price').innerText = (activePrice * activeQty).toFixed(0) + " EGP"; }
        function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; clearInterval(carouselInterval); }
        function moveSlide(dir) {
            const track = document.getElementById('det-carousel-track');
            const count = (activeProd && activeProd.imgs) ? activeProd.imgs.length : 1;
            currentSlideIndex = (currentSlideIndex + dir + count) % count;
            track.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
        }

        function confirmAddToCart() {
            if ((activeProd.priceSm || activeProd.priceMd || activeProd.priceLg) && !activeSize) {
                alert(i18n[currentLang].alertSize); return;
            }
            cart.push({ 
                id: activeProd.id, 
                name: activeProd.name, 
                size: activeSize || 'Fixed', 
                price: activePrice * activeQty, 
                qty: activeQty,
                stockField: activeSize ? 'stock' + activeSize : 'stock'
            });
            updateCartCount(); closeDetail(); showToast();
        }

        function showToast() {
            const t = document.getElementById('soft-toast');
            t.innerText = i18n[currentLang].toast;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function updateCartCount() { document.getElementById('cart-count').innerText = cart.length; }
        function toggleCart() {
            const el = document.getElementById('cart-overlay');
            el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
            if(el.style.display === 'flex') renderCartItems();
        }

        function renderCartItems() {
            const list = document.getElementById('cart-items-list');
            let total = 0;
            if(cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding: 20px; color: #a1887f;">${i18n[currentLang].empty}</p>`;
                document.getElementById('total-price-tag').innerText = "0 EGP";
                return;
            }
            list.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `<div class="cart-item">
                    <div><b style="color:var(--dark-pink)">${item.name}</b> (${item.qty})<br><small style="color:#8d6e63">${item.size !== 'Fixed' ? item.size : ''}</small></div>
                    <div style="display:flex; align-items:center; gap:10px;"><b>${item.price.toFixed(0)} EGP</b> <i class="fas fa-trash-alt" style="color:var(--danger-red); cursor:pointer;" onclick="cart.splice(${idx},1);renderCartItems();updateCartCount();"></i></div>
                </div>`;
            }).join('');
            document.getElementById('total-price-tag').innerText = i18n[currentLang].total + total.toFixed(0) + " EGP";
        }

        async function submitOrder() {
            const t = i18n[currentLang];
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const city = document.getElementById('cust-city').value;
            const address = document.getElementById('cust-address').value;

            if(!name || !phone || !city || !address || cart.length === 0) { alert(t.alertInfo); return; }

            const btn = document.getElementById('btn-submit-order');
            btn.disabled = true;
            btn.innerText = "...";

            try {
                for (let item of cart) {
                    const ref = db.ref('products/' + item.id + '/' + item.stockField);
                    await ref.transaction(current => (current || 0) - item.qty);
                }
                await db.ref('orders').push({
                    customer: { name, phone, city, address },
                    items: cart, total: cart.reduce((a,b)=>a+b.price, 0),
                    date: new Date().toLocaleString()
                });
                alert(t.success);
                cart = []; location.reload();
            } catch (e) { alert("Error!"); btn.disabled = false; btn.innerText = t.submit; }
        }

        // --- التعديل النهائي هنا لحل مشكلة لينك الواتساب ---
        db.ref('social').on('value', snap => {
            const s = snap.val();
            if(s) {
                const update = (id, url) => {
                    const el = document.getElementById(id);
                    if(url) { 
                        el.href = url; 
                        el.style.display = "inline-block"; 
                    } else {
                        el.style.display = "none";
                    }
                };

                // معالجة لينك الواتساب بذكاء
                if (s.whatsapp) {
                    let waVal = s.whatsapp.toString();
                    // لو القيمة مش بتبدأ بـ http، يبقى هو رقم، نحوله للينك
                    let finalWa = waVal.startsWith('http') ? waVal : `https://wa.me/${waVal.replace('+', '').replace(/\s/g, '')}`;
                    update('link-wa', finalWa);
                } else {
                    update('link-wa', null);
                }

                update('link-fb', s.facebook); 
                update('link-ig', s.instagram); 
                update('link-tk', s.tiktok);
            }
        });

        window.onload = updateStaticTexts;
    </script>
</body>
</html>
